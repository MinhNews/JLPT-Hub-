<ins class="adsbygoogle" data-ad-client="ca-pub-9202256620459772" data-ad-slot="7565604990" data-ad-format="auto" data-full-width-responsive="true"></ins></div></div><noscript><div class="vnjp-noscript">⚠️ Vui lòng bật JavaScript để xem nội dung trang này.</div></noscript><div class="vnjp-js-only"><style>

/* ===== Card ===== */
.ka-card{
  border:1px solid #eef2f7;
  border-radius:16px;
  overflow:hidden;
  background:#fff;
  margin:16px 0;
}
.ka-card-grid{
  display:grid;
  grid-template-columns: 260px 1fr;
}
.ka-left{
  padding:18px 16px;
  border-right:1px solid #eef2f7;
  background:#fcfdff;
}
.ka-right{
  padding:18px 18px;
}

/* ===== Left: Kanji + HV same line ===== */
.ka-kanji-line{
  display:flex;
  align-items:flex-start;
  gap:14px;
  margin-bottom:12px;
}
.ka-kanji{
  font-size:72px;
  font-weight:900;
  line-height:1;
  color:#0f172a;
  letter-spacing:1px;
}
.ka-hv{
  margin-top:12px;           /* tạo cảm giác giống ảnh bạn gửi */
  font-size:18px;
  font-weight:900;
  letter-spacing:1px;
  color:#0f172a;
}

/* ===== Left: meta rows (ÂM / NGHĨA) ===== */
.ka-meta{
  display:grid;
  grid-template-columns: 70px 1fr;
  gap:10px 12px;
  align-items:start;
}
.ka-label{
  font-size:12px;
  font-weight:800;
  letter-spacing:.6px;
  color:#64748b;
  text-transform:uppercase;
}
.ka-val{
  font-size:16px;
  font-weight:700;
  color:#0f172a;
}
.ka-val small{
  font-weight:700;
  color:#475569;
}
.ka-val .ka-jp{
  font-weight:800;
  font-size:18px;
  color:#0f172a;
}
.ka-val .ka-mean{
  font-weight:800;
}

/* ===== Right: image + text ===== */
.ka-mid{
  display:grid;
  grid-template-columns: 220px 1fr;
  gap:16px;
  align-items:center;
}
.ka-imgbox{
  background:#fff;
  padding:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.ka-imgbox img{
  max-width:100%;
  height:auto;
  display:block;
}
.ka-jp-title{
  font-size:20px;
  font-weight:900;
  color:#0f172a;
  line-height:1.5;
  margin:0 0 10px;
}
.ka-sep{
  height:1px;
  background:linear-gradient(to right, rgba(148,163,184,.15), rgba(148,163,184,.7), rgba(148,163,184,.15));
  margin:10px 0 12px;
}
.ka-vn{
  font-size:15.5px;
  color:#334155;
  margin:0;
}

/* ===== Ruby readability ===== */
ruby{ruby-position:over}
rt{font-size:.72em;color:#64748b}
rp{color:#94a3b8}

/* ===== Vocabulary block ===== */
.ka-vocab{
  margin-top:12px;
  padding:14px 14px;
  border:1px solid #eef2f7;
  border-radius:14px;
  background:#fafcff;
}
.ka-vocab-grid{
  display:grid;
  grid-template-columns: 1fr 1fr;
}
.ka-vocab-grid .col{
  font-size:16px;
  line-height:1.9;
}
.ka-vocab-grid .col + .col{
  border-left:1px dashed #e2e8f0;
  padding-left:14px;
}

/* ===== List bài ===== */
.ka-list{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}
@media(max-width:900px){.ka-list{grid-template-columns:repeat(2,minmax(0,1fr));}}
@media(max-width:768px){.ka-list{grid-template-columns:1fr;}}
.ka-list a{
  display:block;
  padding:10px 12px;
  border:1px solid #e5e7eb;
  border-radius:12px;
  text-decoration:none;
  font-weight:800;
  color:#0f172a;
  background:#fff;
}
.ka-list a:hover{background:#f8fafc}

/* ===== Responsive ===== */
@media(max-width:768px){
  .ka-card-grid{grid-template-columns:1fr}
  .ka-left{border-right:0;border-bottom:1px solid #eef2f7}
  .ka-mid{grid-template-columns:1fr}
  .ka-imgbox{justify-content:flex-start}
  .ka-hv{margin-top:6px}
  .ka-vocab-grid{grid-template-columns:1fr}
  .ka-vocab-grid .col + .col{border-left:0;padding-left:0;}
  /* bỏ đường kẻ dưới tiêu đề JP */
  .ka-sep{
    display:none !important;
  }
}


}
